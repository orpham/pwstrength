<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pwstrength — Basic Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        body {
            padding: 2rem;
        }

        .demo {
            max-width: 480px;
        }
    </style>
</head>
<body>
<div class="demo">
    <h4 class="mb-4">pwstrength — Basic Example</h4>

    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input id="username" type="text" class="form-control" placeholder="Username">
    </div>

    <div class="mb-1">
        <label for="password" class="form-label">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Password">
    </div>

    <div id="pw-container" class="mt-2 mb-3">
        <div class="pwstrength_viewport_progress"></div>
    </div>
</div>

<script type="module">
    import {PasswordStrength} from '../../dist/pwstrength.js';

    new PasswordStrength(document.getElementById('password'), {
        minChar: 8,
        maxChar: 64,
        usernameField: '#username',
        ui: {
            container: document.getElementById('pw-container'),
            viewports: {progress: '.pwstrength_viewport_progress'},
            showVerdictsInsideProgressBar: true,
            progressBarExtraCssClasses: 'progress-bar-striped progress-bar-animated',
        },
    });
</script>
</body>
</html>
