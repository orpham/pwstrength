name: CI

on:
    push:
        branches: [ main ]
        tags: [ '*.*.*' ]
    pull_request:
        branches: [ main ]

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4

            -   uses: actions/setup-node@v4
                with:
                    node-version: 22
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Type check
                run: npx tsc --noEmit

            -   name: Test
                run: npm test

            -   name: Build
                run: npm run build

    publish:
        needs: test
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        permissions:
            id-token: write
            contents: read

        steps:
            -   uses: actions/checkout@v4

            -   uses: actions/setup-node@v4
                with:
                    node-version: 22

            -   name: Upgrade npm
                run: npm install -g npm@latest --force

            -   name: Install dependencies
                run: npm ci

            -   name: Build
                run: npm run build

            -   name: Publish to npm
                run: npm publish --access=public --provenance
